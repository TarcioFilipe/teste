<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contato.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <title>Contato</title>
</head>
<body>

    <header>
        <div class="container-header">
    
            <div class="logo"></div>
            <nav>
                <ul>
                    <li><a href="./index.html">HOME</a></li>
                    <li><a href="./Sobre.html">QUEM SOMOS</a></li>
                    <li><a href="">PAÍSES</a></li>
                    <li><a href="">EMPRESAS</a></li>
                    <li><a href="">PARCERIAS</a></li>
                    <li><a href="">CADASTRO</a></li>
                    <li><a href="">SOBRE NÓS</a></li>
                    <li><a href="">DÚVIDAS</a></li>
                </ul>
            </nav>
        </div>
    </header> 
    
    <div class="bg" id="bg-inicio">
        <form action="">
            <h1 id="h1-cadastro">ENTRE EM CONTATO CONOSCO</h1>
            <br>
            <p id="p-contato">Por favor, preencha o formulário <br> e alguem da nossa equipe entrará em contato </p>
               
    
            <div class="input-form">
                <input type="text" class="input" id="nome" required>
                <label for="nome">Nome Completo*</label>
            </div>
            <div class="input-form">
                <input type="text" class="input" id="email" required>
                <label for="email">Email comercial*</label>
            </div>
            <div class="input-form">
                <input type="tel" class="input" id="telefone" required>
                <label for="telefone">Número de telefone*</label>
            </div>
            <div class="input-form">
                <input type="text" class="input" id="pais" required>
                <label for="pais">Em que país você está localizado*</label>
            </div>
           
            <div class="input-form">
                <textarea class="input" id="txt-area" cols="80%" rows="4">
                    
                </textarea>
                <label for="txt-area" id="txt-area-label">Conte mais sobre você</label>
            </div>
    
            <div class="input-form">
                <input type="submit" value="ENVIAR" id="btn-submit">
            </div>
        </form>
    </div>
</body>
</html>
